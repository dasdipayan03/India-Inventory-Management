<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sale Entry & Generate Invoice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root {
            --bg: #f4f6fb;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 14px;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, Arial;
            background: var(--bg);
            color: #111827;
        }

        /* ===== Layout ===== */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 16px;
        }

        /* ===== Header ===== */
        .topbar {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            padding: 20px;
            border-radius: var(--radius);
            color: #fff;
            margin-bottom: 20px;
        }

        .topbar h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* ===== Cards ===== */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            transition: 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 14px;
            font-size: 1rem;
        }

        /* ===== Inputs ===== */
        input,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            transition: 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .form-row>* {
            flex: 1;
        }

        /* ===== Table ===== */
        .items-table {
            overflow-x: auto;
        }

        .items-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .items-table th {
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #f1f5f9;
            padding: 10px;
        }

        .items-table td {
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .items-table tbody tr:hover {
            background: #f9fafb;
        }

        /* ===== Totals ===== */
        .summary-box {
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .summary-grand {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* ===== Buttons ===== */
        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s ease;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn.primary:hover {
            transform: translateY(-1px);
        }

        .btn.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn.info {
            background: #e0f2fe;
            color: #075985;
        }

        /* ===== Actions ===== */
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .actions .btn {
            flex: 1;
        }

        /* ===== Search Section ===== */
        .search-card {
            background: #f8fafc;
        }

        /* ===== Mobile ===== */
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
            }

            .actions {
                flex-direction: column;
            }

            .topbar h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="topbar">
            <h2>Sale Entry & Generate Invoice</h2>
            <div class="right gst-box">
                <details style="background:#fff;padding:6px 8px;border-radius:6px;border:1px solid #ddd;">
                    <summary style="cursor:pointer;font-weight:600;">Add shop information one time for invoice</summary>
                    <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;">
                        <input id="shopName" type="text" placeholder="Shop Name" />
                        <input id="shopAddress" type="text" placeholder="Shop Address" />
                        <input id="gstInput" type="text" placeholder="GST Number" />
                        <input id="gstRateInput" type="number" step="0.01" min="0"
                            placeholder="GST Rate (%) [Don't use % Symbol]" />
                        <button id="saveGstBtn" class="btn small">Save</button>
                    </div>
                </details>
            </div>
        </header>

        <main>
            <section class="card invoice-card">
                <div class="card-title">Invoice Information</div>
                <div class="card-header">
                    <div class="card-left">
                        <label>Invoice No:</label>
                        <div id="invoiceNo">--</div>
                    </div>
                    <div class="card-right">
                        <label>Date:</label>
                        <div id="invoiceDate">--</div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="card-title">Customer Details</div>
                    <div class="form-row">
                        <input id="custName" placeholder="Customer name" />
                        <input id="custContact" placeholder="Contact number" />
                    </div>
                    <div class="form-row"><textarea id="custAddress" placeholder="Customer address"></textarea></div>

                    <div class="card-title">Items</div>
                    <div class="items-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Item Name</th>
                                    <th>Qty</th>
                                    <th>Rate</th>
                                    <th>Base</th>
                                    <th>GST</th>
                                    <th>Total</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="itemsTbody"></tbody>
                        </table>
                        <button id="addItemBtn" class="btn small">+ Add Item</button>
                    </div>

                    <div class="summary-box">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="subtotal">0.00</span>
                        </div>

                        <div class="summary-row">
                            <span>GST (<span id="gstRateLabel">18</span>%)</span>
                            <span id="gstAmount">0.00</span>
                        </div>

                        <div class="summary-row summary-grand">
                            <span>Total</span>
                            <span id="grandTotal">0.00</span>
                        </div>
                    </div>

                    <div class="actions">
                        <button id="saveInvoiceBtn" class="btn primary"><i class="fa fa-file-invoice">
                            </i> Submit Invoice</button>
                        <button id="clearBtn" class="btn danger"><i class="fa fa-trash"></i> Clear</button>
                    </div>
                </div>
            </section>

            <section class="card search-card">
                <h3>Search Invoice</h3>
                <div class="search-row">
                    <div class="dropdown-wrap search-input-wrap">
                        <input id="searchInvoiceInput"
                            placeholder="Invoice No or Date (YYYYMMDD) for details of a Invoice" />
                    </div>

                    <div class="search-actions">
                        <button id="searchInvoiceBtn" class="btn info">
                            <i class="fa fa-magnifying-glass"></i> Click for all Invoices / Search
                        </button>
                        <button id="searchDownloadBtn" class="btn info">
                            <i class="fa fa-download"></i> Download
                        </button>
                    </div>
                </div>
                <div id="searchResult" class="search-result"></div>
            </section>

            <div class="back-link">
                <a href="index.html" class="back-btn">
                    ← Back to Home Page
                </a>
            </div>

        </main>
    </div>

    <!-- ===== Download Confirmation Modal ===== -->
    <div id="downloadModal" style="display:none; position:fixed; inset:0; z-index:2000;">
        <div style="position:absolute; inset:0; background:rgba(0,0,0,0.45);"></div>
        <div style="
                position:relative;
                max-width:320px;
                margin:25vh auto;
                background:#fff;
                border-radius:10px;
                padding:16px;
                text-align:center;
                box-shadow:0 20px 40px rgba(0,0,0,0.2);
            ">
            <h3>Download Invoice</h3>
            <p>Do you want to download the invoice?</p>
            <div style="display:flex; gap:10px; margin-top:14px;">
                <button id="modalYes" class="btn primary" style="flex:1;">Yes</button>
                <button id="modalNo" class="btn danger" style="flex:1;">No</button>
            </div>
        </div>
    </div>


    <script>

        function safeInvoiceDate(d) {
            if (!d) {
                return new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
            }

            // YYYY-MM-DD case
            if (/^\d{4}-\d{2}-\d{2}$/.test(d)) {
                d = d + 'T00:00:00';
            }

            const dt = new Date(d);

            if (isNaN(dt.getTime())) {
                return new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
            }

            return dt.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
        }


        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // mobile & multiple download safe
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }



        async function loadItemNames() {
            try {
                const r = await authFetch(API_PREFIX + '/items/names', {
                    headers: { Authorization: 'Bearer ' + token }
                });
                if (r.ok) {
                    itemNames = await r.json();
                } else {
                    itemNames = [];
                }
            } catch (e) {
                console.error('Failed to load item names', e);
                itemNames = [];
            }
        }



        async function loadInvoiceNumbers() {
            try {
                const r = await authFetch(API_PREFIX + '/invoices/numbers', {
                    headers: { Authorization: 'Bearer ' + token }
                });

                if (!r.ok) {
                    console.error('Invoice number fetch failed');
                    invoiceNumbers = [];
                    return;
                }

                invoiceNumbers = await r.json();
                console.log('✅ Invoice numbers loaded:', invoiceNumbers);

            } catch (err) {
                console.error('Invoice fetch error:', err);
                invoiceNumbers = [];
            }
        }





        const API_PREFIX = '/api';
        const token = localStorage.getItem('token');
        // 🔒 AUTH CHECK ON PAGE LOAD
        if (!token) {
            alert("Session expired. Please login again.");
            window.location.href = "login.html";
        }

        // 🔒 GLOBAL 401 HANDLER WRAPPER
        async function authFetch(url, options = {}) {
            options.headers = options.headers || {};
            options.headers["Authorization"] = "Bearer " + token;

            const response = await fetch(url, options);

            if (response.status === 401) {
                localStorage.removeItem("token");
                alert("Session expired. Please login again.");
                window.location.href = "login.html";
                return;
            }

            return response;
        }
        let userGstRate = 18; // Default fallback
        let itemNames = [];
        let invoiceNumbers = []; // 🔥 SEARCH DROPDOWN CACHE

        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = "login.html";
            }


            const downloadModal = document.getElementById('downloadModal');
            const modalYes = document.getElementById('modalYes');
            const modalNo = document.getElementById('modalNo');

            let pendingInvoiceNo = null;

            function showDownloadModal(invoiceNo) {
                pendingInvoiceNo = invoiceNo;
                downloadModal.style.display = 'block';
            }

            function hideDownloadModal() {
                pendingInvoiceNo = null;
                downloadModal.style.display = 'none';
            }



            const shopName = document.getElementById('shopName');
            const shopAddress = document.getElementById('shopAddress');
            const gstInput = document.getElementById('gstInput');
            const saveGstBtn = document.getElementById('saveGstBtn');
            const invoiceNoEl = document.getElementById('invoiceNo');
            const invoiceDateEl = document.getElementById('invoiceDate');
            const custName = document.getElementById('custName');
            const custContact = document.getElementById('custContact');
            const custAddress = document.getElementById('custAddress');
            const itemsTbody = document.getElementById('itemsTbody');
            const addItemBtn = document.getElementById('addItemBtn');
            const subtotalEl = document.getElementById('subtotal');
            const gstAmountEl = document.getElementById('gstAmount');
            const grandTotalEl = document.getElementById('grandTotal');
            const saveInvoiceBtn = document.getElementById('saveInvoiceBtn');
            const clearBtn = document.getElementById('clearBtn');
            const searchInput = document.getElementById('searchInvoiceInput');
            const invoiceDropdown = document.createElement('div');
            invoiceDropdown.className = 'dropdown-list';



            searchInput.closest('.dropdown-wrap').appendChild(invoiceDropdown);
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim().toLowerCase();
                invoiceDropdown.innerHTML = '';

                if (!q) {
                    invoiceDropdown.style.display = 'none';
                    return;
                }

                const matches = invoiceNumbers
                    .filter(no => no.toLowerCase().includes(q))
                    .slice(0, 10);

                if (!matches.length) {
                    invoiceDropdown.style.display = 'none';
                    return;
                }

                matches.forEach(no => {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    div.textContent = no;
                    div.onclick = () => {
                        searchInput.value = no;
                        invoiceDropdown.style.display = 'none';
                    };
                    invoiceDropdown.appendChild(div);
                });

                invoiceDropdown.style.display = 'block';
            });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#searchInvoiceInput') &&
                    !e.target.closest('.dropdown-list')) {
                    invoiceDropdown.style.display = 'none';
                }
            });



            const searchBtn = document.getElementById('searchInvoiceBtn');
            const searchDownloadBtn = document.getElementById('searchDownloadBtn');
            const searchResult = document.getElementById('searchResult');

            function authHeaders() {
                return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
            }

            async function init() {
                if (!token) { alert('Please log in first'); return; }
                await loadItemNames();
                await loadInvoiceNumbers();
                try {
                    const gstR = await authFetch(API_PREFIX + '/shop-info', { headers: authHeaders() });
                    const gstJ = await gstR.json();
                    if (gstJ.success && gstJ.settings) {
                        const s = gstJ.settings;
                        if (s.shop_name) shopName.value = s.shop_name;
                        if (s.shop_address) shopAddress.value = s.shop_address;
                        if (s.gst_no) gstInput.value = s.gst_no;
                        if (s.gst_rate) {
                            userGstRate = parseFloat(s.gst_rate) || 18;
                            document.getElementById('gstRateInput').value = userGstRate;
                        }
                        // Update GST label text to match user's saved rate
                        const gstRateLabel = document.getElementById("gstRateLabel");
                        if (gstRateLabel) {
                            gstRateLabel.textContent = userGstRate;
                        }
                        if (gstLabelDiv) {
                            gstLabelDiv.innerHTML = `GST (${userGstRate}%): <span id="gstAmount">${gstAmountEl.textContent}</span>`;
                        }
                        recalcTotals(); // ✅ Immediately refresh subtotal, GST, and label
                    }
                } catch (e) { }

                try {
                    const r = await authFetch(API_PREFIX + '/invoices/new', { headers: authHeaders() });
                    const j = await r.json();
                    if (j.success) {
                        invoiceNoEl.textContent = j.invoice_no;
                        invoiceDateEl.textContent = safeInvoiceDate(j.date || new Date());
                    }
                } catch (e) { }

                addItemRow();
                recalcTotals();
            }

            saveGstBtn.onclick = async () => {
                const data = {
                    shop_name: shopName.value.trim(),
                    shop_address: shopAddress.value.trim(),
                    gst_no: gstInput.value.trim(),
                    gst_rate: parseFloat(document.getElementById('gstRateInput').value) || 18
                };
                const r = await authFetch(API_PREFIX + '/shop-info', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify(data)
                });


                const j = await r.json();
                alert(j.success ? 'Shop info saved!' : 'Error saving shop info');
                if (j.success) {
                    userGstRate = parseFloat(document.getElementById('gstRateInput').value) || 18;
                    recalcTotals();
                }

            };

            function renderDropdown(listEl, items, onSelect) {
                if (!items.length) {
                    listEl.style.display = 'none';
                    return;
                }

                listEl.innerHTML = items
                    .map(i => `<div class="dropdown-item">${i}</div>`)
                    .join('');

                listEl.style.display = 'block';

                listEl.querySelectorAll('.dropdown-item').forEach(el => {
                    el.onclick = () => {
                        onSelect(el.textContent);
                        listEl.style.display = 'none';
                    };
                });
            }

            function addItemRow(item = { description: '', quantity: 1, rate: 0 }) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                        <td class="item-cell">
                            <div class="dropdown-wrap">
                                <input class="item-input" placeholder="Search item">
                                <div class="dropdown-list"></div>
                            </div>
                        </td>
                        <td><input type="number" step="0.001" min="0" value="${item.quantity}"></td>
                        <td><input type="number" step="0.01" min="0" value="${item.rate}"></td>
                        <td class="base-cell">0.00</td>
                        <td class="gst-cell">0.00</td>
                        <td class="total-cell">0.00</td>
                        <td><button class="btn small">❌</button></td>
                    `;

                itemsTbody.appendChild(tr);

                const itemInput = tr.querySelector('.item-input');
                const dropdown = tr.querySelector('.dropdown-list');
                const qtyInput = tr.children[1].querySelector('input');
                const rateInput = tr.children[2].querySelector('input');
                const baseCell = tr.querySelector('.base-cell');
                const gstCell = tr.querySelector('.gst-cell');
                const totalCell = tr.querySelector('.total-cell');
                const removeBtn = tr.children[6].querySelector('button');

                // ✅ Sale page style dropdown (ONLY THIS)
                itemInput.addEventListener('input', () => {
                    const q = itemInput.value.toLowerCase();
                    dropdown.innerHTML = '';

                    if (!q) {
                        dropdown.style.display = 'none';
                        return;
                    }

                    const matches = itemNames
                        .filter(name => name.toLowerCase().includes(q))
                        .slice(0, 15);

                    if (!matches.length) {
                        dropdown.style.display = 'none';
                        return;
                    }

                    matches.forEach(name => {
                        const div = document.createElement('div');
                        div.className = 'dropdown-item';
                        div.textContent = name;

                        div.onclick = async () => {
                            itemInput.value = name;
                            dropdown.style.display = 'none';

                            const r = await fetch(
                                API_PREFIX + '/items/info?name=' + encodeURIComponent(name),
                                { headers: { Authorization: 'Bearer ' + token } }
                            );
                            if (r.ok) {
                                const j = await r.json();
                                rateInput.value = j.selling_rate || 0;
                                recalcRow();
                            }
                        };

                        dropdown.appendChild(div);
                    });

                    dropdown.style.display = 'block';
                });

                function recalcRow() {
                    const qty = parseFloat(qtyInput.value || 0);
                    const rate = parseFloat(rateInput.value || 0);

                    const base = +(qty * rate).toFixed(2);
                    const gst = +(base * userGstRate / 100).toFixed(2);
                    const total = +(base + gst).toFixed(2);

                    baseCell.textContent = base.toFixed(2);
                    gstCell.textContent = gst.toFixed(2);
                    totalCell.textContent = total.toFixed(2);

                    recalcTotals();
                }

                qtyInput.oninput = rateInput.oninput = recalcRow;

                removeBtn.onclick = () => {
                    tr.remove();
                    recalcTotals();
                };

                recalcRow();
            }


            addItemBtn.onclick = () => addItemRow();

            function recalcTotals() {
                let sub = 0;
                itemsTbody.querySelectorAll('tr').forEach(r => {
                    sub += parseFloat(r.querySelector('.base-cell')?.textContent) || 0;
                });

                const gst = (sub * (userGstRate / 100)).toFixed(2);
                const total = (sub + parseFloat(gst)).toFixed(2);

                subtotalEl.textContent = sub.toFixed(2);
                gstAmountEl.textContent = gst;
                grandTotalEl.textContent = total;

                // ✅ Update GST label dynamically on every refresh/recalc
                const gstLabelDiv = document.querySelector('.totals div:nth-child(2)');
                if (gstLabelDiv) {
                    gstLabelDiv.innerHTML = `GST (${userGstRate}%): <span id="gstAmount">${gst}</span>`;
                }
            }


            // ✅ Save Invoice + Silent PDF Download
            saveInvoiceBtn.onclick = async () => {
                const data = {
                    customer_name: custName.value.trim(),
                    contact: custContact.value.trim(),
                    address: custAddress.value.trim(),
                    gst_no: gstInput.value.trim() || null,
                    items: []
                };
                itemsTbody.querySelectorAll('tr').forEach(r => {
                    const d = r.children[0].querySelector('input').value.trim(),
                        q = parseFloat(r.children[1].querySelector('input').value) || 0,
                        p = parseFloat(r.children[2].querySelector('input').value) || 0;
                    if (d || q > 0 || p > 0) data.items.push({ description: d, quantity: q, rate: p });
                });
                if (!data.items.length) return alert('Add at least one item');
                const res = await authFetch(API_PREFIX + '/invoices', {
                    method: 'POST', headers: authHeaders(), body:
                        JSON.stringify(data)
                });
                const j = await res.json();
                if (j.success) {

                    showDownloadModal(j.invoice_no);

                    // ✅ Clear form and refresh next invoice number
                    custName.value = custContact.value = custAddress.value = '';
                    itemsTbody.innerHTML = '';
                    addItemRow();
                    recalcTotals();

                    try {
                        const r = await authFetch(API_PREFIX + '/invoices/new', { headers: authHeaders() });
                        const next = await r.json();
                        if (next.success) {
                            invoiceNoEl.textContent = next.invoice_no;
                            invoiceDateEl.textContent = safeInvoiceDate(next.date || new Date());
                        }
                    } catch (e) {
                        console.warn('Error fetching next invoice number', e);
                    }
                } else {
                    alert('Error saving invoice');
                }
            };

            // ✅ Clear Button
            clearBtn.onclick = async () => {
                custName.value = custContact.value = custAddress.value = '';
                itemsTbody.innerHTML = '';
                addItemRow();
                recalcTotals();
                try {
                    const r = await authFetch(API_PREFIX + '/invoices/new', { headers: authHeaders() });
                    const j = await r.json();
                    if (j.success) {
                        invoiceNoEl.textContent = j.invoice_no;
                        invoiceDateEl.textContent = safeInvoiceDate(j.date || new Date());
                    }
                } catch (err) {
                    console.warn('Network error fetching new invoice number:', err);
                }
            };

            // ✅ Search & Render Invoice
            searchBtn.onclick = async () => {
                const inv = searchInput.value.trim();

                // 🔹 If invoice number দেওয়া থাকে → old behaviour
                if (inv) {
                    const r = await authFetch(API_PREFIX + '/invoices/' + encodeURIComponent(inv), {
                        headers: { Authorization: 'Bearer ' + token }
                    });

                    const j = await r.json();
                    if (!j.success) return alert('Invoice not found');
                    renderSearch(j.invoice);
                    return;
                }

                // 🔹 If empty → load all invoices
                const r = await authFetch(API_PREFIX + '/invoices', {
                    headers: { Authorization: 'Bearer ' + token }
                });

                const j = await r.json();
                if (!j.success) return alert('Failed to load invoices');

                renderAllInvoices(j.invoices);
            };


            //for search invoice table

            function renderSearch(inv) {
                let html = `
    <div class="invoice-preview">
        <div class="invoice-head">
            <b>${inv.invoice_no}</b>
            <span>${new Date(inv.date).toLocaleString()}</span>
        </div>

        <div class="invoice-customer">
            ${inv.customer_name || ''} ${inv.contact || ''}<br>
            ${inv.address || ''}
        </div>

        <div class="invoice-items">
            `;

                inv.items.forEach(it => {
                    html += `
            <div class="invoice-item">
                <div class="item-name">${it.description}</div>
                <div class="item-row">
                    <span>Qty: <b>${it.quantity}</b></span>
                    <span>Rate: <b>${it.rate}</b></span>
                    <span>Amt: <b>${it.amount}</b></span>
                </div>
            </div>
            `;
                });

                html += `
        </div>

        <div class="invoice-totals">
            <div>Subtotal: <b>${inv.subtotal}</b></div>
            <div>GST: <b>${inv.gst_amount}</b></div>
            <div class="grand">Total: ${inv.total_amount}</div>
        </div>
    </div>
    `;

                searchResult.innerHTML = html;
            }




            // show all invoices
            function renderAllInvoices(rows) {

                if (!rows.length) {
                    searchResult.innerHTML = '<p>No invoices found</p>';
                    return;
                }

                let html = `
                <div style="
                    display:grid;
                    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
                    gap:14px;
                    width:100%;
                ">
                `;
                rows.forEach(r => {

                    html += `
                <div style="
                    background:#ffffff;
                    border-radius:12px;
                    padding:14px;
                    box-shadow:0 6px 18px rgba(0,0,0,0.06);
                    transition:transform 0.15s ease, box-shadow 0.15s ease;
                    font-size:0.9rem;
                "
                onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 24px rgba(0,0,0,0.1)';"
                onmouseout="this.style.transform='none'; this.style.boxShadow='0 6px 18px rgba(0,0,0,0.06)';"
                >

                <div style="
                    display:flex;
                    justify-content:space-between;
                    margin-bottom:6px;
                    font-weight:600;
                ">
                    <span>${new Date(r.date).toLocaleDateString('en-IN')}</span>
                    <span style="color:#2563eb;">
                        ₹ ${Number(r.total_amount).toFixed(2)}
                    </span>
                </div>

                <div 
                    class="invoice-click"
                    data-inv="${r.invoice_no}"
                    style="
                        font-weight:700;
                        color:#2563eb;
                        margin-bottom:6px;
                        cursor:pointer;
                        word-break:break-word;
                    ">
                    ${r.invoice_no}
                </div>

                <div style="margin-bottom:4px;">
                    <strong>Customer:</strong> ${r.customer_name || '-'}
                </div>

                <div>
                    <strong>Contact:</strong> ${r.contact || '-'}
                </div>
                
                <div style="margin-top:10px; text-align:right;">
                    <button 
                        class="invoice-download-btn"
                        data-inv="${r.invoice_no}"
                        style="
                            padding:6px 10px;
                            font-size:0.8rem;
                            border-radius:6px;
                            border:1px solid #dbeafe;
                            background:#e0f2fe;
                            color:#075985;
                            cursor:pointer;
                        "
                    >
                        ⬇ Download
                    </button>
                </div>
                    </div>
                `;
                });

                html += `</div>`;

                searchResult.innerHTML = html;

                // click to open invoice details
                document.querySelectorAll('.invoice-click').forEach(el => {
                    el.addEventListener('click', async () => {

                        const invNo = el.getAttribute('data-inv');

                        try {
                            const r = await authFetch(API_PREFIX + '/invoices/' + encodeURIComponent(invNo), {
                                headers: { Authorization: 'Bearer ' + token }
                            });

                            const j = await r.json();

                            if (!j.success) {
                                alert('Invoice not found');
                                return;
                            }

                            renderSearch(j.invoice);

                        } catch (err) {
                            alert('Failed to load invoice');
                        }

                    });
                });
                // download button click
                document.querySelectorAll('.invoice-download-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {

                        e.stopPropagation(); // prevent invoice click trigger

                        const invNo = btn.getAttribute('data-inv');

                        try {
                            const response = await fetch(
                                `${API_PREFIX}/invoices/${encodeURIComponent(invNo)}/pdf`,
                                { headers: { Authorization: 'Bearer ' + token } }
                            );

                            if (!response.ok) throw new Error('Download failed');

                            const blob = await response.blob();
                            downloadBlob(blob, `${invNo}.pdf`);

                        } catch (err) {
                            alert('Failed to download invoice');
                        }
                    });
                });
            }




            // ✅ Silent Search Download
            searchDownloadBtn.onclick = async () => {
                const inv = searchInput.value.trim();
                if (!inv) return;
                try {
                    const response = await fetch(`${API_PREFIX}/invoices/${encodeURIComponent(inv)}/pdf`, {
                        headers: { Authorization: 'Bearer ' + token }
                    });
                    if (!response.ok) throw new Error('Download failed');
                    const blob = await response.blob();
                    downloadBlob(blob, `${inv}.pdf`);
                } catch (err) {
                    alert('Failed to download PDF: ' + err.message);
                }
            };



            modalYes.onclick = async () => {
                if (!pendingInvoiceNo) return;

                try {
                    const response = await fetch(
                        `${API_PREFIX}/invoices/${encodeURIComponent(pendingInvoiceNo)}/pdf`,
                        { headers: { Authorization: 'Bearer ' + token } }
                    );
                    if (!response.ok) throw new Error('Download failed');

                    const blob = await response.blob();
                    downloadBlob(blob, `${pendingInvoiceNo}.pdf`);
                } catch (err) {
                    alert('Failed to download PDF: ' + err.message);
                }

                hideDownloadModal();
            };

            modalNo.onclick = () => {
                hideDownloadModal();
            };


            init();
        });
    </script>

</body>

</html>
